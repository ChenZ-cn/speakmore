<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SpeakMore icon</title>
  <desc id="desc">A rounded dark app icon with a teal voice waveform, a gold text cursor, and a small sparkle.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="48" x2="416" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071321"/>
      <stop offset="1" stop-color="#020712"/>
    </linearGradient>
    <linearGradient id="wave" x1="144" y1="136" x2="300" y2="376" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3ef7de"/>
      <stop offset="1" stop-color="#0cbda6"/>
    </linearGradient>
    <linearGradient id="cursor" x1="336" y1="176" x2="336" y2="344" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd83d"/>
      <stop offset="1" stop-color="#ffae16"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#00101c" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect x="56" y="56" width="400" height="400" rx="96" fill="url(#bg)" filter="url(#softShadow)"/>
  <g fill="url(#wave)">
    <rect x="126" y="224" width="34" height="84" rx="17"/>
    <rect x="180" y="176" width="34" height="180" rx="17"/>
    <rect x="234" y="124" width="34" height="284" rx="17"/>
    <rect x="288" y="178" width="34" height="176" rx="17"/>
  </g>
  <rect x="342" y="222" width="34" height="114" rx="17" fill="url(#cursor)"/>
  <path d="M368 148c8 34 20 46 54 54-34 8-46 20-54 54-8-34-20-46-54-54 34-8 46-20 54-54z" fill="#ffd83d"/>
</svg>
